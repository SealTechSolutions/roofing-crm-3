# Codemagic CI/CD config for SealTech CRM iOS builds.
#
# Free tier: 500 minutes/month on Apple M1 Macs. Enough for weekly TestFlight
# releases plus ad-hoc bug-fix builds.
#
# Prerequisites (done once via Codemagic UI, NOT this file):
#   1. Connect the GitHub repo to Codemagic
#   2. Team Settings → Integrations → Apple Developer Portal → sign in
#   3. Team Settings → Integrations → App Store Connect → paste API key
#      (Key ID, Issuer ID, .p8 file)
#   4. Team Settings → Code signing identities → auto-manage (Codemagic
#      generates signing certs and provisioning profiles for us)
#
# When the Apple Developer account is ready and you send me the Team ID,
# I'll register the App ID `com.sealtechbuilding.crm` in App Store Connect
# and then a single push to `main` (or a manual trigger in Codemagic) will
# produce a signed .ipa uploaded straight to TestFlight.

workflows:
  ios-testflight:
    name: SealTech CRM — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    # `integrations` block is intentionally omitted. We authenticate to
    # App Store Connect using the API key env vars declared in the
    # `app_store_credentials` group below (APP_STORE_CONNECT_ISSUER_ID,
    # APP_STORE_CONNECT_KEY_IDENTIFIER, APP_STORE_CONNECT_PRIVATE_KEY).
    # This avoids the need to also configure an ASC integration in
    # Team Settings → Integrations.

    environment:
      # Apple Team ID for SealTech Building Solutions (Individual enrollment).
      # Codemagic uses this in combination with the App Store Connect API key
      # (from the `app_store_credentials` group below) to auto-provision
      # signing certs and distribution profiles for com.sealtechbuilding.crm.
      vars:
        APPLE_TEAM_ID: "2J8T63SX9L"
        BUNDLE_ID: "com.sealtechbuilding.crm"
        XCODE_WORKSPACE: "App.xcworkspace"
        XCODE_SCHEME: "App"

      groups:
        # `app_store_credentials` group must be created in Codemagic Team
        # Settings → Environment variables → Add Group. Contents:
        #   APP_STORE_CONNECT_ISSUER_ID
        #   APP_STORE_CONNECT_KEY_IDENTIFIER
        #   APP_STORE_CONNECT_PRIVATE_KEY (paste the .p8 file contents)
        - app_store_credentials

      node: 22.11.0
      xcode: latest
      cocoapods: default

    scripts:
      - name: Install web dependencies
        script: |
          cd frontend
          yarn install --frozen-lockfile

      - name: Build React web bundle
        script: |
          cd frontend
          # frontend/.env is gitignored (it contains local dev config),
          # so Codemagic never sees it. Without REACT_APP_BACKEND_URL at
          # build time, every API call inside the iOS app resolves to
          # `undefined/api/...` and silently fails (login shows no error,
          # just doesn't proceed). We write the .env inline right before
          # `yarn build` so the value gets baked into the bundle.
          #
          # This URL is where the FastAPI backend lives — same host the
          # web PWA hits. If we ever move to sealtechbuilding.com, update
          # here (or promote it to a Codemagic env var).
          cat > .env <<'EOF'
          REACT_APP_BACKEND_URL=https://roofing-crm-3.preview.emergentagent.com
          WDS_SOCKET_PORT=443
          ENABLE_HEALTH_CHECK=false
          EOF
          # The React build gets baked into the iOS app. When the app
          # launches on-device, this bundle is what runs. Note: because
          # the app also runs against the live backend URL, most updates
          # can ship as pure-web changes without rebuilding the .ipa.
          #
          # CI=false: CRA/craco defaults to treating lint warnings as
          # errors when it detects a CI env. We have a backlog of
          # exhaustive-deps warnings that don't affect runtime, so we
          # opt out of the fail-on-warning behavior for now.
          CI=false yarn build

      - name: Add + sync iOS platform
        script: |
          cd frontend
          # First-time build: create the ios/ directory Capacitor uses.
          # Idempotent — re-running does nothing if ios/ already exists.
          npx cap add ios || true
          # Sync copies /build → ios/App/App/public and updates plugin
          # native code. Runs every build.
          npx cap sync ios

      - name: Patch Info.plist with privacy purpose strings
        script: |
          # Apple's App Store validator (Feb 2024+) rejects any binary that
          # references a privacy-relevant API without a matching *UsageDescription
          # key, even if the app doesn't use the API directly. Capacitor's
          # geolocation plugin transitively references location APIs, so we
          # MUST declare NSLocationWhenInUseUsageDescription AND
          # NSLocationAlwaysAndWhenInUseUsageDescription. Camera/photo/mic
          # purpose strings are added here too — belt-and-suspenders for
          # future @capacitor/camera + @capacitor/voice-recorder plugins so
          # the next reviewer doesn't reject us for a different key.
          #
          # PlistBuddy is preinstalled on Codemagic macOS images. `-c "Add"`
          # errors if the key already exists, so we swallow with `|| true`
          # and follow with `Set` to guarantee the final value regardless of
          # whether Capacitor's default plist already contained the key.
          PLIST="frontend/ios/App/App/Info.plist"
          if [ ! -f "$PLIST" ]; then
            echo "Info.plist not found at $PLIST"; exit 1;
          fi
          set_key () {
            local key="$1"; local value="$2"
            /usr/libexec/PlistBuddy -c "Add :${key} string ${value}" "$PLIST" 2>/dev/null || true
            /usr/libexec/PlistBuddy -c "Set :${key} ${value}" "$PLIST"
          }
          set_key NSLocationWhenInUseUsageDescription \
            "SealTech CRM tags site photos with GPS coordinates so you can find the property later."
          set_key NSLocationAlwaysAndWhenInUseUsageDescription \
            "SealTech CRM tags site photos with GPS coordinates so you can find the property later."
          set_key NSCameraUsageDescription \
            "SealTech CRM uses the camera to capture roof condition photos during site walks."
          set_key NSPhotoLibraryUsageDescription \
            "SealTech CRM saves and imports project photos from your library."
          set_key NSPhotoLibraryAddUsageDescription \
            "SealTech CRM saves annotated project photos to your library."
          set_key NSMicrophoneUsageDescription \
            "SealTech CRM records short audio notes captioning your photos."
          set_key NSFaceIDUsageDescription \
            "SealTech CRM uses Face ID to sign you in on this device."
          # Show the final plist for troubleshooting; failures above surface here.
          /usr/libexec/PlistBuddy -c "Print" "$PLIST" | head -60

      - name: Set app version + build number
        script: |
          cd frontend/ios/App
          # Version tracks the marketing version (semver, user-facing).
          # Build number MUST increment each upload to TestFlight — using
          # $BUILD_NUMBER (Codemagic's monotonically-incrementing counter)
          # guarantees every upload has a unique, higher build number than
          # the previous one. Fallback to `1` for local/dry runs where the
          # var is unset.
          agvtool new-marketing-version 1.0.0
          agvtool new-version -all "${BUILD_NUMBER:-1}"

      - name: Initialize keychain
        script: |
          # Codemagic's keychain wraps macOS's Keychain Access. We must
          # initialize it before fetching signing files so the CLI has
          # somewhere to store the generated certificate + private key.
          keychain initialize

      - name: Fetch signing files (cert + provisioning profile)
        script: |
          # Auth to App Store Connect via env-var API key, register the
          # bundle identifier if missing, and fetch/create an App Store
          # distribution profile + certificate.
          #
          # ---- Certificate handling ----
          # Apple caps each team at 2 iOS Distribution certificates.
          # If the build fails with HTTP 409 "You already have a current
          # Distribution certificate", MANUALLY revoke both existing
          # certificates in App Store Connect (Users and Access →
          # Integrations → Certificates) then re-run this build. Only
          # needs to be done once — after this build succeeds, the
          # yaml stores the private key on the Codemagic runner and
          # reuses the same cert on subsequent builds via `--type` alone.
          #
          # `--certificate-key` supplies an RSA private key we generate
          # on-the-fly. Without it the CLI errors "Cannot save Signing
          # Certificates without certificate private key" because Apple
          # requires the CSR to be signed by a key we control locally.
          # OpenSSL is preinstalled on Codemagic's macOS images.
          openssl genrsa -out /tmp/dist_cert_key.pem 2048
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --platform IOS \
            --type IOS_APP_STORE \
            --certificate-key=@file:/tmp/dist_cert_key.pem \
            --create

      - name: Add certificates to Xcode keychain
        script: |
          keychain add-certificates

      - name: Configure Xcode project to use fetched profiles
        script: |
          xcode-project use-profiles

      - name: Build signed IPA
        script: |
          cd frontend/ios/App
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - frontend/ios/App/build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      # Auto-upload the signed .ipa to App Store Connect → TestFlight.
      # First upload requires ~10 min processing on Apple's side before
      # it appears in TestFlight; subsequent uploads are usually faster.
      app_store_connect:
        # Env-var auth: Codemagic reads the 3 vars below from the
        # `app_store_credentials` group and builds the JWT itself.
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        # Beta testers get an email the moment TestFlight processing
        # completes. Groups are configured in App Store Connect →
        # TestFlight → External Testing.
        beta_groups:
          - SealTech Team
